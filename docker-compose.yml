services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: deep-cuts-db
    restart: unless-stopped
    ports:
      - "5433:5432"  # 5433 to avoid conflicts with any local Postgres
    environment:
      POSTGRES_DB: deep_cuts
      POSTGRES_USER: deep_cuts
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-deep_cuts_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deep_cuts"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
